name: Publish Plugin

on:
  push:
    branches: [main]
    paths:
      - 'gradle.properties'
  workflow_dispatch:

jobs:
  check-version:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Compare pluginVersion
        id: diff
        run: |
          CURRENT=$(grep '^pluginVersion=' gradle.properties | cut -d= -f2)
          PREVIOUS=$(git show HEAD^:gradle.properties 2>/dev/null | grep '^pluginVersion=' | cut -d= -f2 || echo "")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT), skipping publish"
          fi

  publish:
    name: Build, sign & publish
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Sign plugin
        run: ./gradlew signPlugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: build/distributions/*.zip
